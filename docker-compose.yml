version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: quant_trader
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: ${QT_DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Unified engine + web UI. SessionManager orchestrates all trading pipelines
  # (data feed, strategy, risk, execution, portfolio) per session as asyncio tasks.
  # Previously active sessions are auto-restarted on startup.
  engine:
    build: .
    command: python -m scripts.run_monitor
    env_file: .env
    environment:
      QT_ENV: prod
      QT_REDIS_HOST: redis
      QT_DATABASE_HOST: postgres
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
