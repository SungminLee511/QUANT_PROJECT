version: "3.8"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes  # BUG 6: enable AOF persistence
    network_mode: host
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: timescale/timescaledb:2.17.2-pg16  # BUG 4: pin version to avoid silent breakage
    network_mode: host
    environment:
      POSTGRES_DB: quant_trader
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: ${QT_DB_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro  # BUG 2: enable TimescaleDB extension
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant_trader"]
      interval: 10s
      timeout: 5s
      retries: 5

  # BUG 1 fix: Run Alembic migrations before app starts.
  # Ensures schema exists even after volume wipe or first boot.
  db-init:
    build: .
    network_mode: host
    command: ["bash", "-c", "echo 'Waiting for database...' && sleep 5 && alembic upgrade head && echo 'Database initialization complete'"]
    env_file: .env
    environment:
      QT_ENV: prod
      QT_REDIS_HOST: localhost
      QT_DATABASE_HOST: localhost
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Unified engine + web UI. SessionManager orchestrates all trading pipelines
  # (data feed, strategy, risk, execution, portfolio) per session as asyncio tasks.
  # Previously active sessions are auto-restarted on startup.
  engine:
    build: .
    network_mode: host
    command: python -m scripts.run_monitor
    env_file: .env
    environment:
      QT_ENV: prod
      QT_REDIS_HOST: localhost
      QT_DATABASE_HOST: localhost
    depends_on:
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped
    stop_grace_period: 30s  # BUG 8: give time to close sessions, orders, DB connections

volumes:
  redis_data:
  pg_data:
