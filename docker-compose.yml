version: "3.8"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes  # BUG 6: enable AOF persistence
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: timescale/timescaledb:2.17.2-pg16  # BUG 4: pin version to avoid silent breakage
    environment:
      POSTGRES_DB: quant_trader
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: ${QT_DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro  # BUG 2: enable TimescaleDB extension
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant_trader"]
      interval: 10s
      timeout: 5s
      retries: 5

  # BUG 1 fix: Run Alembic migrations before app starts.
  # Ensures schema exists even after volume wipe or first boot.
  db-init:
    build: .
    command: >
      bash -c "
        echo 'Waiting for database to be fully ready...' &&
        python -c \"
import time, sys
for i in range(30):
    try:
        import asyncpg, asyncio
        async def check():
            conn = await asyncpg.connect(
                host='postgres', port=5432,
                user='quant', password='$${QT_DB_PASSWORD:-changeme}',
                database='quant_trader'
            )
            await conn.close()
        asyncio.run(check())
        print('Database is ready')
        break
    except Exception as e:
        print(f'Attempt {i+1}/30: {e}')
        time.sleep(2)
else:
    print('Database not ready after 60s')
    sys.exit(1)
        \" &&
        echo 'Running Alembic migrations...' &&
        alembic upgrade head &&
        echo 'Database initialization complete'
      "
    env_file: .env
    environment:
      QT_ENV: prod
      QT_REDIS_HOST: redis
      QT_DATABASE_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Unified engine + web UI. SessionManager orchestrates all trading pipelines
  # (data feed, strategy, risk, execution, portfolio) per session as asyncio tasks.
  # Previously active sessions are auto-restarted on startup.
  engine:
    build: .
    command: python -m scripts.run_monitor
    env_file: .env
    environment:
      QT_ENV: prod
      QT_REDIS_HOST: redis
      QT_DATABASE_HOST: postgres
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped
    stop_grace_period: 30s  # BUG 8: give time to close sessions, orders, DB connections

volumes:
  redis_data:
  pg_data:
