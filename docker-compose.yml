version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: quant_trader
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: ${QT_DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant"]
      interval: 10s
      timeout: 5s
      retries: 5

  data-feed:
    build: .
    command: python -m scripts.run_data
    env_file: .env
    environment:
      QT_ENV: prod
      QT_REDIS_HOST: redis
      QT_DATABASE_HOST: postgres
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  strategy:
    build: .
    command: python -m scripts.run_strategy
    env_file: .env
    environment:
      QT_ENV: prod
      QT_REDIS_HOST: redis
      QT_DATABASE_HOST: postgres
    depends_on:
      redis:
        condition: service_healthy
      data-feed:
        condition: service_started
    restart: unless-stopped

  execution:
    build: .
    command: python -m scripts.run_execution
    env_file: .env
    environment:
      QT_ENV: prod
      QT_REDIS_HOST: redis
      QT_DATABASE_HOST: postgres
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  monitor:
    build: .
    command: python -m scripts.run_monitor
    env_file: .env
    environment:
      QT_ENV: prod
      QT_REDIS_HOST: redis
      QT_DATABASE_HOST: postgres
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
