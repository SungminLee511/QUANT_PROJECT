# Alembic configuration for Quant Trading System
#
# Connection string is overridden in env.py from QT_* environment variables.
# The value below is a fallback for local development only.

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = postgresql://quant:changeme@localhost:5432/quant_trader

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
